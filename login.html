<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <link rel="stylesheet" href="style/style.css">
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">


</head>

<body>
    <!--  -->
    <div class="login-container gap-y-5">

        <img class=" mx-auto" src="assets/github-logo.png" alt="">
        <br>
        <h1>GitHub Issues Tracker</h1>
        <p>Track and manage issues easily</p>

        <br>

        <label class="block text-left font-bold">Name</label>
        <input type="text" id="username" placeholder="Username">
        <br>
        <small class="block text-left">Default: admin</small>
        <label class="block text-left font-bold">Password</label>
        <input type="password" id="password" placeholder="Password">
        <br>
        <small class="block text-left">Default: admin123</small>
        <br>

        <button class="btn w-full btn-primary" onclick="login()">Sign In</button>
        <br>
        <br>
        <h2 class="text=-center">OR</h2>

        <p class="demo">
            Demo Credentials <br>
            Username: admin <br>
            Password: admin123
        </p>


    </div>


    <script src="index.js"></script>

</body>

</html>
