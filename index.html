<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Issues Tracker</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">

</head>

<body class="bg-gray-100">

    <!-- Navbar -->

    <div class="navbar bg-base-100 shadow-md px-8">

        <div class="flex-1">
            <img class="w-[25px] h-[25px]" src="assets/github-logo.png" alt="">
            <a class="text-xl font-bold">GitHub Issues</a>
        </div>

        <div class="flex gap-2">

            <input type="text" placeholder="Search issues" class="input input-bordered w-48" id="searchInput" />

            <button onclick="searchIssues()" class="btn btn-primary">
                New issues
            </button>

        </div>

    </div>


    <!-- Tabs -->

    <div class="px-8 mt-6">

        <div role="tablist" class="tabs tabs-boxed w-fit">

            <a role="tab" class="tab tab-active" onclick="changeTab(event,'all')">All</a>
            <a role="tab" class="tab" onclick="changeTab(event,'open')">Open</a>
            <a role="tab" class="tab" onclick="changeTab(event,'closed')">Closed</a>
        </div>

    </div>


    <!-- Loading Spinner -->

    <div id="loading" class="flex justify-center mt-10 hidden">
        <span class="loading loading-spinner loading-lg"></span>
    </div>


    <!-- Issues Container -->

    <div id="issues-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 p-8">

    </div>



    <script src="index.js"></script>


</body>

</html>
