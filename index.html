<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Issues Tracker</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">

</head>

<body class="bg-gray-100">

    <!-- Navbar  ar kaj akane-->

    <div class="navbar bg-base-100 shadow-md px-8">

        <div class="flex-1">
            <img class="w-[25px] h-[25px]" src="assets/github-logo.png" alt="">
            <a class="text-xl font-bold">GitHub Issues</a>
        </div>

        <div class="flex gap-2">

            <input type="text" placeholder="Search issues" class="input input-bordered w-48" id="searchInput" />

            <button onclick="searchIssues()" class="btn btn-primary">
                New issues
            </button>

        </div>

    </div>


    <!-- Tabs -->

    <div class="px-8 mt-6">

        <div role="tablist" class="tabs tabs-boxed w-fit">

            <a role="tab" class="tab tab-active" onclick="changeTab(event,'all')">All</a>
            <a role="tab" class="tab" onclick="changeTab(event,'open')">Open</a>
            <a role="tab" class="tab" onclick="changeTab(event,'closed')">Closed</a>
        </div>

    </div>


    <!--  Spinner -->

    <div id="loading" class="flex justify-center mt-10 hidden">
        <span class="loading loading-spinner loading-lg"></span>
    </div>


    <!-- Issues Container -->

    <div id="issues-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 p-8">

    </div>

    <!--  Modal ar kaj akon -->

    <dialog id="issueModal" class="modal">
        <div class="modal-box">

            <h3 id="modalTitle" class="font-bold text-lg"></h3>

            <p id="modalDescription" class="py-2"></p>

            <p><b>Status:</b> <span id="modalStatus"></span></p>
            <p><b>Author:</b> <span id="modalAuthor"></span></p>
            <p><b>Priority:</b> <span id="modalPriority"></span></p>
            <p><b>Label:</b> <span id="modalLabel"></span></p>
            <p><b>Created:</b> <span id="modalDate"></span></p>

            <div class="modal-action">
                <form method="dialog">
                    <button class="btn">Close</button>
                </form>
            </div>

        </div>
    </dialog>

    <script src="index.js"></script>


</body>

</html>
